<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="icon" href="/images/logo.png" type="image/png">
    <title>Ro:D - 월간매거진</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/monthly-magazine.css}" />
</head>
<body>
<div class="screen">
    <main class="magazine-main">
        <div th:replace="~{/fragments/header :: headerFragment}"></div>

        <div class="event-date-section">
            <div class="event-title">이 달의 이벤트</div>
            <div class="date-display">
                <div class="date-year-month" th:text="${currentYear} + ' ' + ${currentMonth}">2025 OCT</div>
                <div class="date-day-of-week" th:text="${currentDayOfWeek}">MON</div>
                <div class="date-day" th:text="${currentDayOfMonth}">20</div>
            </div>
        </div>

        <div class="featured-event-section">
            <img src="/images/chung.png" alt="효녀 청이 포스터" class="featured-event-image">
            <hr class="event-divider">
            <div class="featured-event-details">
                <h2 class="event-main-title">효녀 청이</h2>
                <p class="event-sub-text">25.10.31 - 25.11.01</p>
                <p class="event-sub-text">경산 시립 극단 제 16회 정기공연</p>
            </div>
        </div>

        <div class="recent-stories-header">
            <h3>최근 이야기</h3>
            <hr>
        </div>

        <div class="magazine-list">
            <th:block th:each="item, iterStat : ${magazineItems}">
                <a th:if="${iterStat.index == 0 and pageNum == 1}"
                   th:href="@{/monthly-magazine/1}"
                   class="magazine-item">
                    <div class="item-image" th:style="'background-image: url(' + @{${item.imageUrl}} + ');'"></div>
                    <h3 class="item-title" th:text="${item.title}">월간매거진_제목</h3>
                    <p class="item-snippet" th:text="${item.snippet}">월간매거진_본문</p>
                </a>
                <div th:unless="${iterStat.index == 0 and pageNum == 1}"
                     class="magazine-item disabled">
                    <div class="item-image" th:style="'background-image: url(' + @{${item.imageUrl}} + ');'"></div>
                    <h3 class="item-title" th:text="${item.title}">월간매거진_제목</h3>
                    <p class="item-snippet" th:text="${item.snippet}">월간매거진_본문</p>
                </div>
            </th:block>
        </div>

        <nav class="pagination-container" aria-label="Page navigation">
            <a th:href="@{/monthly-magazine(page=1)}" class="page-arrow-btn first-page" aria-label="First page">
                <img th:src="@{/images/last-page.png}" alt="첫 페이지로"/>
            </a>

            <th:block th:each="pageNumber : ${#numbers.sequence(1, totalPages)}">
                <a th:href="@{/monthly-magazine(page=${pageNumber})}"
                   class="page-number-btn"
                   th:classappend="${pageNumber == pageNum} ? 'active'"
                   th:text="${pageNumber}"
                   th:aria-current="${pageNumber == pageNum} ? 'page'">
                </a>
            </th:block>

            <a th:href="@{/monthly-magazine(page=${totalPages})}" class="page-arrow-btn last-page" aria-label="Last page">
                <img th:src="@{/images/last-page.png}" alt="마지막 페이지로"/>
            </a>
        </nav>
    </main>

    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
</body>
</html>
