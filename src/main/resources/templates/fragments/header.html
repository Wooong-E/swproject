<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<header id="main-header" th:fragment="headerFragment" th:classappend="${currentPage == 'courses' ? 'courses-page' : (currentPage == 'monthly-magazine' ? 'monthly-magazine-page' : '')}">
    <div class="header-top-bar">
        <a href="/"><img src="/images/logo.png" alt="Ro:D" class="header-logo" /></a>
        <button id="menu-button" class="mingcute-menu-line" type="button" aria-label="메뉴 열기">
            <img src="/images/mingcute_menu-line.svg" alt="메뉴" />
        </button>
    </div>
    <nav>
        <ul id="main-top-nav" role="list">
            <li class="div-wrapper">
                <a href="/attractions" class="text-wrapper-10" th:classappend="${currentPage == 'attractions'} ? 'active' : ''">명소</a>
            </li>
            <li class="frame-8">
                <a href="/restaurants" class="text-wrapper-10" th:classappend="${currentPage == 'restaurants'} ? 'active' : ''">맛집</a>
            </li>
            <li class="frame-9">
                <a href="/cafes" class="text-wrapper-10" th:classappend="${currentPage == 'cafes'} ? 'active' : ''">카페</a>
            </li>
            <li class="frame-10">
                <a id="course-planning-link" href="/courses/course00" class="text-wrapper-10" th:classappend="${currentPage == 'courses'} ? 'active' : ''" type="button">코스짜기</a>
            </li>
            <li class="frame-11">
                <a href="/monthly-magazine" class="text-wrapper-10" th:classappend="${currentPage == 'monthly-magazine'} ? 'active' : ''" type="button">월간매거진</a>
            </li>
        </ul>
    </nav>


    <!-- 사이드바 시작 -->
    <aside id="sidebar" class="sidebar" role="complementary" aria-label="사이드바 메뉴">
        <header class="sidebar-header">
            <a href="/" style="text-decoration: none; color: inherit;"><h1 class="text-wrapper">Ro:D</h1></a>
            <button id="close-button" class="close-button" type="button" aria-label="사이드바 닫기">
                <img class="streamline-delete" src="/images/streamline-delete-1-solid.svg" alt="" />
            </button>
        </header>
        <section class="user-section">
            <!-- 로그인하지 않은 상태 -->
            <div th:unless="${isLoggedIn}">
                <button class="login-button" type="button" onclick="location.href='/login'">로그인 및 회원가입</button>
            </div>
            <!-- 로그인한 상태 -->
            <div th:if="${isLoggedIn}">
                <p class="welcome-message" th:text="|${userName}님, 환영합니다!|"></p>
            </div>
        </section>
        <div class="sidebar-divider"></div>
        <nav class="overlap-group" role="navigation" aria-label="메인 메뉴">
            <div th:unless="${isLoggedIn}">
                <ul class="frame" role="list">
                    <li class="div-wrapper"><a href="#" class="div protected-link">나의 코스</a></li>
                    <li class="div-wrapper"><a href="/courses/course00" class="div protected-link">코스 짜기</a></li>
                    <li class="div-wrapper"><a href="/my-place" class="div protected-link">찜한 명소</a></li>
                    <li class="div-wrapper"><a href="/suggest" class="div protected-link">장소 제보하기</a></li>
                    <li class="div-wrapper"><a href="/report" class="div protected-link">문의하기</a></li>
                </ul>
            </div>
            <div th:if="${isLoggedIn}">
                <ul class="frame" role="list">
                    <li class="div-wrapper"><a href="/my-courses" class="div">나의 코스</a></li>
                    <li class="div-wrapper"><a href="/courses/course00" class="div">코스 짜기</a></li>
                    <li class="div-wrapper"><a href="/my-place" class="div">찜한 명소</a></li>
                    <li class="div-wrapper"><a href="/suggest" class="div">장소 제보하기</a></li>
                    <li class="div-wrapper"><a href="/report" class="div">문의하기</a></li>
                </ul>
            </div>

        </nav>
    </aside>
    <script th:inline="javascript">
        var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
    </script>
    <script src="/js/sidebar.js"></script>
</header>
</body>
</html>
