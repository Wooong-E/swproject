<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>퓨전 한식 상세</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/restaurant-detail.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
</head>
<body>
    <div class="screen">
        <main class="attraction-detail-main">
            <div th:replace="~{/fragments/header-back :: headerBackFragment}"></div>

            <!-- Main Image -->
            <div class="main-image-container">
                <img src="/images/restaurant_fusion.jpg" alt="맛집 이미지" class="attraction-main-image" />
            </div>

            <!-- Title, Description, Heart Button -->
            <section class="info-section">
                <div class="title-heart-wrapper">
                    <h2 class="attraction-title">퓨전 한식</h2>
                    <button class="heart-button" onclick="toggleHeart()">
                        <img id="heartIcon" src="/images/tabler_heart.svg" alt="찜하기" />
                    </button>
                </div>
                <p class="attraction-description">전통 한식에 현대적인 감각을 더한 퓨전 한식 레스토랑입니다. 독특한 맛과 아름다운 플레이팅으로 눈과 입이 즐겁습니다.</p>
            </section>

            <!-- Menu Section -->
            <section class="menu-section">
                <h3 class="menu-title">메뉴</h3>
                <div class="menu-carousel">
                    <div class="menu-card">
                        <img src="/images/menu_galbijjim.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">퓨전 갈비찜</h4>
                        <p class="menu-price">25,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/menu_tteokbokki.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">크림 떡볶이</h4>
                        <p class="menu-price">15,000원</p>
                    </div>
                </div>
            </section>

            <!-- Address and Transportation -->
            <section class="details-section">
                <p class="detail-item"><strong>주소</strong> <span>경상북도 경산시 신대부적로 100</span></p>
                <p class="detail-item"><strong>교통</strong> <span>버스 정류장 도보 3분, 주차 가능</span></p>
            </section>

            <!-- Reviews Section -->
            <section class="reviews-section">
                <h3 class="reviews-title">후기</h3>
                <div class="reviews-carousel">
                    <div class="review-card">
                        <img src="/images/review_placeholder_5.png" alt="후기 이미지" class="review-image" />
                        <h4 class="review-card-title">새로운 맛의 경험!</h4>
                        <div class="review-rating">
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                        </div>
                    </div>
                    <div class="review-card">
                        <img src="/images/review_placeholder_1.png" alt="후기 이미지" class="review-image" />
                        <h4 class="review-card-title">플레이팅이 예술이에요.</h4>
                        <div class="review-rating">
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_empty.svg" alt="별점" class="star-icon" />
                        </div>
                    </div>
                </div>
            </section>

            <!-- Write Review Button -->
            <section class="write-review-section">
                <button class="write-review-button">
                    <span class="write-review-text">작성하기</span>
                    <img src="/images/material-symbols_edit-outline-rounded.svg" alt="작성 아이콘" class="write-review-icon" />
                </button>
            </section>
        </main>

        <!-- Footer -->
        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>
    <script th:src="@{/js/attraction-detail.js}"></script>
</body>
</html>
