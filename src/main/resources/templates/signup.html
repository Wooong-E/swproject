<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>
<h1>회원가입</h1>

<form th:action="@{/users/signup}" th:object="${UserSignupDTO}" method="post">
    <div>
        <label>로그인 ID:</label>
        <input type="text" th:field="*{loginId}" placeholder="ID 입력">
    </div>
    <div>
        <label>비밀번호:</label>
        <input type="password" th:field="*{loginPw}" placeholder="비밀번호 입력">
    </div>
    <div>
        <label>이름:</label>
        <input type="text" th:field="*{name}" placeholder="이름 입력">
    </div>
    <div>
        <label>이메일:</label>
        <input type="email" th:field="*{email}" placeholder="이메일 입력">
    </div>
    <div>
        <label>국가:</label>
        <input type="text" th:field="*{country}" placeholder="국가 입력">
    </div>
    <div>
        <label>종교:</label>
        <input type="text" th:field="*{religion}" placeholder="종교 입력">
    </div>


    <div th:if="${errorMessage}" style="color: red;">
        <p th:text="${errorMessage}"></p>
    </div>

    <button type="submit">회원가입</button>
</form>

<p>이미 계정이 있나요? <a th:href="@{/users/login}">로그인</a></p>
</body>
</html>
