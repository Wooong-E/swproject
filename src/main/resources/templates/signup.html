<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>G:DO 회원가입 - 1단계</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/signup.css}">
</head>
<body>

<div class="signup-container">

    <a href="javascript:history.back()" class="back-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>

    <div class="progress-indicator three-steps">
        <div class="step active"></div> <div class="step"></div>        <div class="step"></div>        </div>

    <form th:action="@{/users/signup/step2}" th:object="${userSignupDTO}" method="post" id="signup-form-step1">

        <h1 class="page-title">이름을 알려주세요</h1>

        <div class="input-group">
            <input type="text" th:field="*{name}" placeholder="이름을 입력해 주세요" class="full-width-input" required>
        </div>

        <button type="submit" class="action-btn next-step-btn">다음으로</button>

    </form>
</div>

</body>
</html>
