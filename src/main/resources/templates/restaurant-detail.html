<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title th:text="${restaurant.name} + ' 상세'"></title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/restaurant-detail.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
</head>
<body>
    <div class="screen">
        <main class="attraction-detail-main">
            <div th:replace="~{/fragments/header-back :: headerBackFragment}"></div>

            <!-- Main Image -->
            <div class="main-image-container">
                <img th:src="${restaurant.imageUrl}" alt="맛집 이미지" class="attraction-main-image" />
            </div>

            <!-- Title, Description, Heart Button -->
            <section class="info-section">
                <div class="title-heart-wrapper">
                    <h2 class="attraction-title" th:text="${restaurant.name}">맛집 제목</h2>
                    <button class="heart-button" onclick="toggleHeart()">
                        <img id="heartIcon" th:src="${restaurant.liked ? '/images/tabler_heart_filled.svg' : '/images/tabler_heart.svg'}" alt="찜하기" />
                    </button>
                </div>
                <p class="attraction-description" th:text="${restaurant.description}">맛집 설명</p>
            </section>

            <!-- Menu Section -->
            <section class="menu-section">
                <h3 class="menu-title">메뉴</h3>
                <div class="menu-carousel">
                    <div class="menu-card" th:each="menu : ${restaurant.menuList}">
                        <img th:src="${menu.imageUrl}" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name" th:text="${menu.name}">메뉴 이름</h4>
                        <p class="menu-price" th:text="${menu.price}">가격</p>
                    </div>
                </div>
            </section>

            <!-- Address and Transportation -->
            <section class="details-section">
                <p class="detail-item"><strong>주소</strong> <span th:text="${restaurant.address}">주소 정보</span></p>
                <p class="detail-item"><strong>교통</strong> <span th:text="${restaurant.transportation}">무료 주차장, 도보 20분</span></p>
            </section>

            <!-- Reviews Section -->
            <section class="reviews-section">
                <h3 class="reviews-title">후기</h3>
                <div class="reviews-carousel">
                    <div class="review-card" th:each="review : ${restaurant.reviews}">
                        <img th:src="${review.reviewImageUrl}" alt="후기 이미지" class="review-image" />
                        <h4 class="review-card-title" th:text="${review.reviewTitle}">후기 제목</h4>
                        <div class="review-rating">
                            <img th:each="i : ${#numbers.sequence(1, 5)}"
                                 th:src="${i <= review.rating ? '/images/star_filled.svg' : '/images/star_empty.svg'}"
                                 alt="별점" class="star-icon" />
                        </div>
                    </div>
                </div>
            </section>

            <!-- Write Review Button -->
            <section class="write-review-section">
                <button class="write-review-button">
                    <span class="write-review-text">작성하기</span>
                    <img src="/images/material-symbols_edit-outline-rounded.svg" alt="작성 아이콘" class="write-review-icon" />
                </button>
            </section>
        </main>

        <!-- Footer -->
        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>
    <script th:src="@{/js/attraction-detail.js}"></script>
</body>
</html>
