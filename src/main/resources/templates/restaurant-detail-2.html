<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="icon" href="/images/logo.png" type="image/png">
    <title>자인식육식당 상세</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/place-detail.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/review-carousel.css}" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
    <div class="screen">
        <main class="attraction-detail-main" data-place-id="8">
            <div th:replace="~{/fragments/header-back :: headerBackFragment}"></div>

            <!-- Main Image -->
            <div class="main-image-container">
                <img src="/images/restaurants/restaurant_2.jpg" alt="맛집 이미지" class="attraction-main-image" />
            </div>

            <!-- Title, Description, Heart Button -->
            <section class="info-section">
                <div class="title-heart-wrapper">
                    <h2 class="attraction-title">자인식육식당</h2>
                    <button id="likeButton" class="heart-button" type="button" aria-label="찜하기">
                        <img id="heartIcon" src="/images/tabler_heart.svg" alt="찜하기" />
                    </button>
                </div>
                <p class="attraction-address">경북 경산시 자인면 일연로 56</p>
            </section>

            <!-- Star Rating Section -->
            <section class="rating-section">
                <span class="rating-score" th:text="${#numbers.formatDecimal(averageGrade, 1, 1)}">0.0</span>
                <div class="stars-wrapper">
                    <div th:each="i : ${#numbers.sequence(1, 5)}" class="star-container">
                        <img th:src="@{/images/star_empty.svg}" alt="Empty Star"/>
                        <img th:if="${averageGrade > (i - 1)}" th:src="@{/images/star_filled.svg}" alt="Filled Star"
                             th:style="'clip-path: inset(0 ' + (100 - (*{i <= averageGrade} ? 100 : (*{averageGrade - (i-1)} * 100))) + '% 0 0);'"/>
                    </div>
                </div>
            </section>

            <!-- Menu Section -->
            <section class="menu-section">
                <h3 class="menu-title">대표 메뉴</h3>
                <div class="menu-carousel">
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_1.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">로스구이(100g)</h4>
                        <p class="menu-price">13,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_2.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">스페샬(100g)</h4>
                        <p class="menu-price">25,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_3.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">뭉티기(100g)</h4>
                        <p class="menu-price">18,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_4.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">갈비살(100g)</h4>
                        <p class="menu-price">18,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_5.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">차돌박기(100g)</h4>
                        <p class="menu-price">16,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_6.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">육회(大)</h4>
                        <p class="menu-price">38,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_7.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">돌판된장</h4>
                        <p class="menu-price">2,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_8.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">육회비빔밥</h4>
                        <p class="menu-price">8,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_9.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">돌판볶음밥</h4>
                        <p class="menu-price">2,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/restaurants/restaurant_2/menu_10.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">공기밥</h4>
                        <p class="menu-price">1,000원</p>
                    </div>
                </div>
            </section>


            <!-- Address and Transportation -->
            <section class="details-section">
                                
                
                <p class="detail-item"><strong>전화번호</strong> <span>053-856-2158</span></p>
                <p class="detail-item"><strong>운영시간</strong> <span>11:00 - 21:00(명절 3일 휴무)</span></p>
            </section>

            <!-- Reviews Section -->
            <section class="reviews-section">
                <h3 class="reviews-title">후기</h3>
                <div class="reviews-carousel">
                    <!-- Loop through reviews -->
                    <a th:each="reviewSummary : ${reviews}" th:href="@{/reviews/{placeId}/{order}(placeId=${placeId}, order=${reviewSummary.review.order})}" class="review-card">
                        <div th:if="${reviewSummary.firstImageUrl != null}">
                            <img th:src="${reviewSummary.firstImageUrl}" alt="후기 이미지" class="review-image" />
                        </div>
                        <div th:unless="${reviewSummary.firstImageUrl != null}" class="review-image-placeholder"></div>
                        
                        <h4 class="review-card-title" th:text="${reviewSummary.review.title}">리뷰 제목</h4>
                        
                        <div class="review-rating">
                            <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                <img th:if="${i <= reviewSummary.review.grade}" src="/images/star_filled.svg" alt="별점" class="star-icon" />
                                <img th:if="${i > reviewSummary.review.grade}" src="/images/star_empty.svg" alt="별점" class="star-icon" />
                            </th:block>
                        </div>
                    </a>
                </div>
            </section>

            <!-- Write Review Button -->
            <section class="write-review-section">
                <a th:href="@{/places/{placeId}/reviews/new(placeId=${placeId})}" id="write-review-link" class="write-review-button">
                    <span class="write-review-text">작성하기</span>
                    <img src="/images/material-symbols_edit-outline-rounded.svg" alt="작성 아이콘" class="write-review-icon" />
                </a>
            </section>
        </main>

        <!-- Footer -->
        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>
    <script th:inline="javascript">
        var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
    </script>
    <script th:src="@{/js/place-detail.js}"></script>
</body>
</html>
