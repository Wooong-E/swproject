<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>G:DO 회원가입 - 3단계</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/signup.css}">
</head>
<body>

<div class="signup-container">

  <a href="javascript:history.back()" class="back-button">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
  </a>

  <div class="progress-indicator three-steps">
    <div class="step active"></div> <div class="step active"></div> <div class="step active"></div> </div>

  <form th:action="@{/users/save}" th:object="${userSignupDTO}" method="post" id="signup-form-step3">

    <input type="hidden" th:field="*{name}">
    <input type="hidden" th:field="*{country}">
    <input type="hidden" th:field="*{religion}">

    <h1 class="page-title">ID와 Password를 입력해주세요</h1>

    <div class="input-container-with-button">
      <p class="input-label">ID를 입력해주세요</p>
      <div class="input-row">
        <input type="text" th:field="*{loginId}" placeholder="ID" class="id-input" required>
      </div>
      <p th:errors="*{loginId}" class="input-error" style="color:red"></p>
      <p th:if="${loginIdError}" class="input-error" th:text="${loginIdError}" style="color:red"></p>

      <p th:unless="${loginIdError}" class="input-help">특수기호는 : ; , . ? ! _ - ( ) # % 만 입력 가능합니다</p>
    </div>

    <div class="input-container-with-button">
      <p class="input-label">이메일을 입력해주세요</p>
      <div class="input-row">
        <input type="email" th:field="*{email}" placeholder="이메일" class="id-input" required>
      </div>
    </div>

    <div class="input-group">
      <p class="input-label">Password를 입력해주세요</p>
      <input type="password" th:field="*{loginPw}" placeholder="Password" class="full-width-input mb-10" required>
      <input type="password" id="confirmPassword" placeholder="Confirm Password" class="full-width-input" required>
      <p class="input-help">특수기호는 : ; , . ? ! _ - ( ) # % 만 입력 가능합니다</p>
    </div>

    <button type="submit" class="action-btn next-step-btn">로그인하러 가기</button>

  </form>
</div>

</body>
</html>
