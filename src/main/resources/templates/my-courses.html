<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="icon" href="/images/logo.png" type="image/png">
    <title>나의 코스</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/place-detail.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/my-courses.css}" />
</head>
<body>
<div class="screen">
    <main class="my-courses-main">
        <div th:replace="~{/fragments/header-back :: headerBackFragment}"></div>
        <h2 class="main-title">나의 코스</h2>
        <ul class="course-list" th:if="${not #lists.isEmpty(allCourses)}">
            <li th:each="courseGroup : ${allCourses}" class="course-item">
                <a th:href="@{/my-courses/detail/{nth}(nth=${courseGroup[0].nth})}" class="course-link">
                    <div class="course-name" th:text="${courseGroup[0].name}">코스 이름</div>
                    <div class="course-dates" th:text="${#temporals.format(courseGroup[0].startdate, 'yy.MM.dd')} + ' ~ ' + ${#temporals.format(courseGroup[0].enddate, 'yy.MM.dd')}"></div>
                </a>
                <form class="delete-form" th:action="@{/my-courses/delete}" method="post">
                    <input type="hidden" name="nth" th:value="${courseGroup[0].nth}" />
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="delete-button">-</button>
                </form>
            </li>
        </ul>
        <div th:if="${#lists.isEmpty(allCourses)}">
            <p>저장된 코스가 없습니다.</p>
        </div>
    </main>
    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
<script th:src="@{/js/my-courses.js}"></script>
</body>
</html>
