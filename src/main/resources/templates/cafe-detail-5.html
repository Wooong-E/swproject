<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>루프탑 카페 상세</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/place-detail.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
    <div class="screen">
        <main class="attraction-detail-main" data-place-id="17">
            <div th:replace="~{/fragments/header-back :: headerBackFragment}"></div>

            <!-- Main Image -->
            <div class="main-image-container">
                <img src="/images/cafe_rooftop.jpg" alt="카페 이미지" class="attraction-main-image" />
            </div>

            <!-- Title, Description, Heart Button -->
            <section class="info-section">
                <div class="title-heart-wrapper">
                    <h2 class="attraction-title">하말</h2>
                    <button id="likeButton" class="heart-button" type="button" aria-label="찜하기">
                        <img id="heartIcon" src="/images/tabler_heart.svg" alt="" />
                    </button>
                </div>
                <p class="attraction-description">반려견 동반이 가능하고 강아지 유모차가 구비 완료되어있다.
                    테라스가 있어 야경을 볼 수 있다.</p>
            </section>

            <!-- Menu Section -->
            <section class="menu-section">
                <h3 class="menu-title">메뉴</h3>
                <div class="menu-carousel">
                    <div class="menu-card">
                        <img src="/images/menu_cocktail.jpg" alt="카페 메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">바로굽는 수플레프런치토스트</h4>
                        <p class="menu-price">9,500원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/menu_beer.jpg" alt="카페 메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">시그니처 소금빵</h4>
                        <p class="menu-price">4,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/menu_beer.jpg" alt="카페 메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">상하목장 아이스크림 크로플세트</h4>
                        <p class="menu-price">10,500원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/menu_beer.jpg" alt="카페 메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">플레인 치아바타</h4>
                        <p class="menu-price">5,000원</p>
                    </div>
                </div>
            </section>

            <!-- Address and Transportation -->
            <section class="details-section">
                <p class="detail-item"><strong>주소</strong> <span>경북 경산시 와촌면 대한길 13 카페 하말</span></p>
                <p class="detail-item"><strong>교통</strong> <span>정각단입구(갓바위방향) / 자차로 가는 것을 추천 교통편이 열악</span></p>
                <p class="detail-item"><strong>영업시간</strong> <span>평일 11:00~19:00 주말 11:00~20:00</span></p>
                <p class="detail-item"><strong>전화번호</strong> <span>0507-1404-0216</span></p>
            </section>

            <!-- Reviews Section -->
            <section class="reviews-section">
                <h3 class="reviews-title">후기</h3>
                <div class="reviews-carousel">
                    <div class="review-card">
                        <img src="/images/review_placeholder_4.png" alt="후기 이미지" class="review-image" />
                        <h4 class="review-card-title">야경이 정말 멋져요.</h4>
                        <div class="review-rating">
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                        </div>
                    </div>
                    <div class="review-card">
                        <img src="/images/review_placeholder_5.png" alt="후기 이미지" class="review-image" />
                        <h4 class="review-card-title">분위기 최고!</h4>
                        <div class="review-rating">
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_empty.svg" alt="별점" class="star-icon" />
                        </div>
                    </div>
                </div>
            </section>

            <!-- Write Review Button -->
            <section class="write-review-section">
                <button class="write-review-button">
                    <span class="write-review-text">작성하기</span>
                    <img src="/images/material-symbols_edit-outline-rounded.svg" alt="작성 아이콘" class="write-review-icon" />
                </button>
            </section>
        </main>

        <!-- Footer -->
        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>
    <script th:inline="javascript">
        var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
    </script>
    <script th:src="@{/js/place-detail.js}"></script>
</body>
</html>
