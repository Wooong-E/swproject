<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>전통 한정식 상세</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/place-detail.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
    <div class="screen">
        <main class="attraction-detail-main" data-place-id="7">
            <div th:replace="~{/fragments/header-back :: headerBackFragment}"></div>

            <!-- Main Image -->
            <div class="main-image-container">
                <img src="/images/restaurant_main.jpg" alt="맛집 이미지" class="attraction-main-image" />
            </div>

            <!-- Title, Description, Heart Button -->
            <section class="info-section">
                <div class="title-heart-wrapper">
                    <h2 class="attraction-title">전통 한정식</h2>
                    <button class="heart-button" onclick="toggleHeart()">
                        <img id="heartIcon" src="/images/tabler_heart.svg" alt="찜하기" />
                    </button>
                </div>
                <p class="attraction-description">정갈하고 맛있는 한정식을 맛볼 수 있는 곳입니다. 신선한 재료로 만든 다양한 반찬과 메인 요리가 일품입니다. 가족 외식이나 중요한 모임에 적합합니다.</p>
            </section>

            <!-- Menu Section -->
            <section class="menu-section">
                <h3 class="menu-title">메뉴</h3>
                <div class="menu-carousel">
                    <div class="menu-card">
                        <img src="/images/menu_bibimbap.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">비빔밥</h4>
                        <p class="menu-price">8,000원</p>
                    </div>
                    <div class="menu-card">
                        <img src="/images/menu_bulgogi.jpg" alt="메뉴 이미지" class="menu-image" />
                        <h4 class="menu-name">불고기</h4>
                        <p class="menu-price">12,000원</p>
                    </div>
                </div>
            </section>

            <!-- Address and Transportation -->
            <section class="details-section">
                <p class="detail-item"><strong>주소</strong> <span>경상북도 경산시 대학로 123</span></p>
                <p class="detail-item"><strong>교통</strong> <span>버스 정류장 도보 5분, 주차 가능</span></p>
            </section>

            <!-- Reviews Section -->
            <section class="reviews-section">
                <h3 class="reviews-title">후기</h3>
                <div class="reviews-carousel">
                    <div class="review-card">
                        <img src="/images/review_placeholder_1.png" alt="후기 이미지" class="review-image" />
                        <h4 class="review-card-title">음식이 정말 맛있어요!</h4>
                        <div class="review-rating">
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                        </div>
                    </div>
                    <div class="review-card">
                        <img src="/images/review_placeholder_2.png" alt="후기 이미지" class="review-image" />
                        <h4 class="review-card-title">분위기가 좋아요.</h4>
                        <div class="review-rating">
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_empty.svg" alt="별점" class="star-icon" />
                        </div>
                    </div>
                </div>
            </section>

            <!-- Write Review Button -->
            <section class="write-review-section">
                <button class="write-review-button">
                    <span class="write-review-text">작성하기</span>
                    <img src="/images/material-symbols_edit-outline-rounded.svg" alt="작성 아이콘" class="write-review-icon" />
                </button>
            </section>
        </main>

        <!-- Footer -->
        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>
    <script th:inline="javascript">
        var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
    </script>
    <script th:src="@{/js/place-detail.js}"></script>
</body>
</html>
