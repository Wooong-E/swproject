<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Ro:D - 카페</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/cafes.css}" />
</head>
<body>
<div class="screen">
    <main class="div">
        <div th:replace="~{/fragments/header :: headerFragment}"></div>

        <section class="category-section">
            <div class="category-buttons">
                <button class="category-button active" type="button">분위기 좋은</button>
                <button class="category-button" type="button">디저트</button>

                <button class="category-button" type="button">기타</button>
            </div>
        </section>

        <section class="attractions-list">
            <div class="frame-14">
                <article class="frame-15" data-place-id="201">
                    <a href="/cafes/1" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="카페 1 찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">카페 이름 1</h3>

                        <button class="img-2" type="button" aria-label="카페 3 찜하기">

            </div>
            <div class="frame-14">
                <article class="frame-15" data-place-id="205">

    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
<script th:inline="javascript">
    var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
</script>
<script th:src="@{/js/cafes.js}"></script>
