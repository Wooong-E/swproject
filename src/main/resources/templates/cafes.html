<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Ro:D - 카페</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/cafes.css}" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="screen">
    <main class="div">
        <div th:replace="~{/fragments/header :: headerFragment}"></div>

        <section class="category-section">
            <div class="category-buttons">
                <button class="category-button active" type="button">분위기 좋은</button>
                <button class="category-button" type="button">디저트</button>
                <button class="category-button" type="button">로스터리</button>
                <button class="category-button" type="button">작업하기 좋은</button>
                <button class="category-button" type="button">이색적인</button>
                <button class="category-button" type="button">기타</button>
            </div>
        </section>

        <section class="attractions-list">
            <div class="frame-14">
                <article class="frame-15" data-place-id="13">
                    <a href="/cafes/1" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">섬섬밀밀</h3>
                        <p class="text-wrapper-12">경북 경산시 진량읍 대구대로 346</p>
                    </div>
                </article>
                <article class="frame-17" data-place-id="14">
                    <a href="/cafes/2" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">파라글로우</h3>
                        <p class="text-wrapper-12">경북 경산시 진량읍 공단 7로3 2층</p>
                    </div>
                </article>
            </div>
            <div class="frame-14">
                <article class="frame-15" data-place-id="15">
                    <a href="/cafes/3" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">카페 이름 3</h3>
                        <p class="text-wrapper-12">카페 주소 3</p>
                    </div>
                </article>
                <article class="frame-17" data-place-id="16">
                    <a href="/cafes/4" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">카페 이름 4</h3>
                        <p class="text-wrapper-12">카페 주소 4</p>
                    </div>
                </article>
            </div>
            <div class="frame-14">
                <article class="frame-15" data-place-id="17">
                    <a href="/cafes/5" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">카페 이름 5</h3>
                        <p class="text-wrapper-12">카페 주소 5</p>
                    </div>
                </article>
                <article class="frame-17" data-place-id="18">
                    <a href="/cafes/6" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">카페 이름 6</h3>
                        <p class="text-wrapper-12">카페 주소 6</p>
                    </div>
                </article>
            </div>
        </section>

    </main>

    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
<script th:inline="javascript">
    var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
</script>
<script th:src="@{/js/attractions.js}"></script>
</body>
</html>
