<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Ro:D - 장소 제보하기</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/suggest.css}" />
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div class="screen">
    <main class="suggest-main">
        <div th:replace="~{/fragments/header-back :: headerBackFragment}"></div>

        <h2 class="main-title">장소 제보하기</h2>

        <form id="suggest-form" action="/suggest" method="post" enctype="multipart/form-data">

            <section class="form-section">
                <h3 class="section-title">주소 입력하기</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="text" id="address-input" name="address" class="title-input" placeholder="주소를 검색하세요" readonly style="flex-grow: 1; min-width: 0;">
                    <button type="button" id="search-address-button" class="search-address-button" style="width: auto; flex-shrink: 0;">주소 검색</button>
                </div>
            </section>

            <section class="form-section">
                <h3 class="section-title">이름을 알려주세요</h3>
                <div class="input-wrapper">
                    <input type="text" id="name" name="name" class="title-input" placeholder="장소의 이름을 입력하세요">
                </div>
            </section>

            <section class="form-section">
                <h3 class="section-title">어떤 유형인가요?</h3>
                <div id="place-type-buttons" class="button-group-row">
                    <button type="button" class="choice-button" data-type="attraction">명소</button>
                    <button type="button" class="choice-button" data-type="restaurant">식당</button>
                    <button type="button" class="choice-button" data-type="cafe">카페</button>
                </div>
            </section>

            <section id="category-section" class="form-section hidden">
                <h3 class="section-title">카테고리를 알려주세요</h3>
                <div id="attraction-categories" class="category-group hidden">
                    <p class="category-group-title">명소 카테고리</p>
                    <div class="button-group-wrap">
                        <button type="button" class="choice-button">자연</button>
                        <button type="button" class="choice-button">역사/문화</button>
                        <button type="button" class="choice-button">포토스팟</button>
                        <button type="button" class="choice-button">야경/전망</button>
                        <button type="button" class="choice-button">테마파크</button>
                        <button type="button" class="choice-button">전통시장</button>
                        <button type="button" class="choice-button">예술전시</button>
                    </div>
                </div>
                <div id="restaurant-categories" class="category-group hidden">
                    <p class="category-group-title">식당 카테고리</p>
                    <div class="button-group-wrap">
                        <button type="button" class="choice-button">로컬</button>
                        <button type="button" class="choice-button">트렌디</button>
                        <button type="button" class="choice-button">특산물</button>
                        <button type="button" class="choice-button">가성비</button>
                    </div>
                </div>
                <div id="cafe-categories" class="category-group hidden">
                    <p class="category-group-title">카페 카테고리</p>
                    <div class="button-group-wrap">
                        <button type="button" class="choice-button">감성</button>
                        <button type="button" class="choice-button">브런치</button>
                        <button type="button" class="choice-button">테마</button>
                        <button type="button" class="choice-button">디저트</button>
                    </div>
                </div>
            </section>

            <section id="atmosphere-section" class="form-section hidden">
                <h3 class="section-title">분위기를 알려주세요 <span class="section-title-light">(식당, 카페 한정)</span></h3>
                <div class="button-group-wrap">
                    <button type="button" class="choice-button" disabled>혼밥 맛집</button>
                    <button type="button" class="choice-button" disabled>단체 모임</button>
                    <button type="button" class="choice-button" disabled>데이트 핫플</button>
                    <button type="button" class="choice-button" disabled>밤플레이스</button>
                </div>
            </section>

            <section id="features-section" class="form-section hidden">
                <h3 class="section-title">특이사항을 알려주세요 <span class="section-title-light">(식당, 카페 한정)</span></h3>
                <div class="button-group-wrap">
                    <button type="button" class="choice-button" disabled>힐링식당</button>
                    <button type="button" class="choice-button" disabled>비건</button>
                    <button type="button" class="choice-button" disabled>노키즈존</button>
                    <button type="button" class="choice-button" disabled>반려동물 동반</button>
                </div>
            </section>

            <section class="form-section">
                <h3 class="section-title">사진을 올려주세요</h3>
                <div class="image-attachment">
                    <label for="image-upload" class="image-upload-label">
                        <img src="/images/material-symbols_edit-outline-rounded.svg" alt="이미지 추가">
                        <span>이미지 추가</span>
                    </label>
                    <input type="file" id="image-upload" accept="image/*" multiple>
                    <div id="image-preview-container" class="image-preview-container">
                        <!-- Image previews will be inserted here by JavaScript -->
                    </div>
                </div>
                 <p class="image-upload-caption">최대 3장까지 첨부할 수 있습니다.</p>
            </section>

            <button type="submit" class="save-button">장소 제보하기</button>
        </form>
    </main>

    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
<script th:src="@{/js/suggest.js}"></script>
</body>
</html>
