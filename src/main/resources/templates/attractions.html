<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Ro:D - 명소</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/attractions.css}" />

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="screen">
    <main class="div">
        <div th:replace="~{/fragments/header :: headerFragment}"></div>

        <section class="category-section">
            <div class="category-buttons">
                <button class="category-button active" type="button" data-category="nature">자연</button>
                <button class="category-button" type="button" data-category="history">역사문화</button>
                <button class="category-button" type="button" data-category="photospot">포토스팟</button>
                <button class="category-button" type="button" data-category="nightview">야경·전망</button>
                <button class="category-button" type="button" data-category="experience">테마파크·체험</button>
                <button class="category-button" type="button" data-category="market">전통시장·거리</button>
            </div>
        </section>

        <section class="attractions-list">
            <!-- 장소 목록이 동적으로 여기에 삽입됩니다. -->
        </section>

    </main>

    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
<script th:inline="javascript">
    var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
</script>
<script th:src="@{/js/attractions.js}"></script>
</body>
</html>
