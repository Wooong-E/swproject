<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Ro:D - 명소</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/attractions.css}" />

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="screen">
    <main class="div">
        <div th:replace="~{/fragments/header :: headerFragment}"></div>

        <section class="category-section">
            <div class="category-buttons">
                <button class="category-button active" type="button">자연</button>
                <button class="category-button" type="button">역사문화</button>
                <button class="category-button" type="button">포토스팟</button>
                <button class="category-button" type="button">야경·전망</button>
                <button class="category-button" type="button">테마파크·체험</button>
                <button class="category-button" type="button">전통시장·거리</button>
            </div>
        </section>

        <section class="attractions-list">
            <div class="frame-14">
                <article class="frame-15" data-place-id="1">
                    <a href="/attractions/1" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">자인 계정숲</h3>
                        <p class="text-wrapper-12">경북 경산시 계정길 80</p>
                    </div>
                </article>
                <article class="frame-15" data-place-id="2">
                    <a href="/attractions/2" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">대구대학교 늘푸른테마 공원</h3>
                        <p class="text-wrapper-12">경북 경산시 진량읍 대구대로 201</p>
                    </div>
                </article>
            </div>
            <div class="frame-14">
                <article class="frame-15" data-place-id="3">
                    <a href="/attractions/3" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">장소3</h3>
                        <p class="text-wrapper-12">장소3 주소</p>
                    </div>
                </article>
                <article class="frame-17" data-place-id="4">
                    <a href="/attractions/4" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">장소4</h3>
                        <p class="text-wrapper-12">장소4 주소</p>
                    </div>
                </article>
            </div>
            <div class="frame-14">
                <article class="frame-15" data-place-id="5">
                    <a href="/attractions/5" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">장소5</h3>
                        <p class="text-wrapper-12">장소5 주소</p>
                    </div>
                </article>
                <article class="frame-17" data-place-id="6">
                    <a href="/attractions/6" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="장소6 찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">장소6</h3>
                        <p class="text-wrapper-12">장소6 설명</p>
                    </div>
                </article>
            </div>
        </section>

    </main>

    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
<script th:inline="javascript">
    var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
</script>
<script th:src="@{/js/attractions.js}"></script>
</body>
</html>
