<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Ro:D - 맛집</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/restaurants.css}" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="screen">
    <main class="div">
        <div th:replace="~{/fragments/header :: headerFragment}"></div>

        <section class="category-section">
            <div class="category-buttons">
                <button class="category-button active" type="button">한식</button>
                <button class="category-button" type="button">중식</button>

                <button class="category-button" type="button">양식</button>

                <button class="category-button" type="button">기타</button>
            </div>
        </section>

        <section class="attractions-list">
            <div class="frame-14">
                <article class="frame-15" data-place-id="101">
                    <a href="/restaurants/1" class="img-wrapper">
                        <button class="img-2" type="button" aria-label="맛집 1 찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />
                        </button>
                    </a>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">맛집 이름 1</h3>
                        <p class="text-wrapper-12">맛집 주소 1</p>
                    </div>
                </article>

            <div class="frame-14">

                        <button class="img-2" type="button" aria-label="맛집 3 찜하기">
                            <img src="/images/tabler_heart.svg" alt="" />

                    </a>
                    <div class="frame-16">

                        </button>

                    <div class="frame-16">
                        <h3 class="text-wrapper-3">맛집 이름 4</h3>
                        <p class="text-wrapper-12">맛집 주소 4</p>
                    </div>
                </article>
            </div>
            <div class="frame-14">
                <article class="frame-15" data-place-id="105">

                        <button class="img-2" type="button" aria-label="맛집 5 찜하기">

    </main>

    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
<script th:inline="javascript">
    var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
</script>
<script th:src="@{/js/restaurants.js}"></script>

</html>
