<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Ro:D - 문의하기</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/report.css}" />
</head>
<body>
<div class="screen">
    <main class="report-main">
        <div th:replace="~{/fragments/header-back :: headerBackFragment}"></div>

        <h2 class="main-title">문의하기</h2>

        <form id="report-form" action="/report" method="post" enctype="multipart/form-data">


            <section class="form-section">
                <h3 class="section-title">제목</h3>
                <div class="input-wrapper">
                    <input type="text" id="title" name="title" class="title-input" placeholder="제목을 입력하세요" maxlength="80">
                    <span class="char-counter"><span id="title-char-count">0</span>/80</span>
                </div>
            </section>

            <section class="form-section">
                <h3 class="section-title">내용</h3>
                <div class="input-wrapper">
                    <textarea id="content" name="content" class="content-textarea" placeholder="내용을 입력하세요" maxlength="1500"></textarea>
                    <span class="char-counter"><span id="content-char-count">0</span>/1500</span>
                </div>
            </section>

            <section class="form-section">
                <h3 class="section-title">이미지 첨부</h3>
                <div class="image-attachment">
                    <label for="image-upload" class="image-upload-label">
                        <img src="/images/material-symbols_edit-outline-rounded.svg" alt="이미지 추가">
                        <span>이미지 추가</span>
                    </label>
                    <input type="file" id="image-upload" name="images" accept="image/*" multiple>
                    <div id="image-preview-container" class="image-preview-container">
                        <!-- Image previews will be inserted here by JavaScript -->
                    </div>
                </div>
                <p class="image-upload-caption">최대 3장까지 첨부할 수 있습니다.</p>
            </section>

            <button type="submit" class="save-button">저장하기</button>
        </form>
    </main>

    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
<script th:src="@{/js/report.js}"></script>
</body>
</html>
