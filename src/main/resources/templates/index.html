<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="icon" href="/images/logo.png" type="image/png">
    <title>Ro:D - 여행 추천 서비스</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/index.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css(v=1.1)}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
</head>
<body>
<div class="screen">
    <main class="div">
        <div th:replace="~{/fragments/header :: headerFragment}"></div>

                    <section class="overlap" aria-label="메인 배너" style="background-image: url('/images/home/home1.png'); background-size: cover; background-position: center;">
                        <div class="image-text-overlay">
                            <p class="issue-number">길 위에서 02호</p>
                            <h2 class="magazine-title">별찌야시장</h2>
                        </div>
                        <a href="/monthly-magazine/2" class="magazine-arrow" aria-label="월간 매거진 상세 페이지 2로 이동">
                            &gt;
                        </a>
                    </section>        <!-- New section starts here -->
        <section class="plan-section" th:if="${isLoggedIn}">
            <div class="plan-box-user">
                <p class="plan-box-user-name" th:text="|${userName}님|"></p>
                <div class="plan-box-user-course">
                    <p class="plan-box-user-course-text">여행 코스</p>
                    <div class="plan-box-user-course-count" th:text="${userStats.courseCount}">0</div>
                </div>
            </div>
            <div class="plan-box-schedule" th:if="${userStats.nearestCourseDate != null}">
                <p class="plan-box-schedule-title">다음 여행 일정</p>
                <p class="plan-box-schedule-status" th:text="${userStats.nearestCourseDate}"></p>
                <p class="plan-box-schedule-dday" th:text="|D - ${userStats.dDay}|"></p>
            </div>
            <div class="plan-box-schedule" th:if="${userStats.nearestCourseDate == null}">
                <p class="plan-box-schedule-title">다음 여행 일정</p>
                <p class="plan-box-schedule-status">일정 없음</p>
                <p class="plan-box-schedule-dday">D - 0</p>
            </div>
        </section>
        <section class="plan-section" th:unless="${isLoggedIn}">
            <div class="plan-box-login">
                <p class="plan-box-login-text">로그인<br>해주세요</p>
            </div>
            <div class="plan-box-schedule">
                <p class="plan-box-schedule-title">다음 여행 일정</p>
                <p class="plan-box-schedule-status">일정 없음</p>
                <p class="plan-box-schedule-dday">D - 0</p>
            </div>
        </section>
        <!-- New section ends here -->
        <section class="frame-13">
            <header class="frame-14">
                <h2 class="text-wrapper-11">이런 곳은 어때요?</h2>
                <button type="button" aria-label="더보기">
                    <img
                            class="iconamoon-arrow-up"
                            src="/images/iconamoon-arrow-up-2.svg"
                            alt=""
                    />
                </button>
            </header>
            <div class="frame-14">
                <article class="frame-15">
                    <div class="img-wrapper">
                        <button class="img-2" type="button" aria-label="반곡지 찜하기">
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                        <img class="image" src="/images/attractions/photospot/13.svg" alt="반곡지" />
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">남매지</h3>
                        <p class="text-wrapper-12">경북 경산시 계양동 (영남대학...</p>
                    </div>
                </article>
                <article class="frame-17">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="이웃집 수달 찜 해제하기"
                                aria-pressed="true"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                        <img class="image" src="/images/attractions/themepark/25.svg" alt="이웃집 수달" />
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">스타필드</h3>
                        <p class="text-wrapper-12">경북 경산시 옥산로 227 스타필...</p>
                    </div>
                </article>
            </div>
        </section>
        <section class="frame-18">
            <header class="frame-14">
                <h2 class="text-wrapper-11">요즘 핫한 맛플레이스</h2>
                <button type="button" aria-label="더보기">
                    <img
                            class="iconamoon-arrow-up"
                            src="/images/iconamoon-arrow-up-2.svg"
                            alt=""
                    />
                </button>
            </header>
            <div class="frame-14">
                <article class="frame-15">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="5525 카페 찜하기"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                        <img class="image" src="/images/restaurants/delicious/local/7.svg" alt="5525 카페" />
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">돈우리</h3>
                        <p class="text-wrapper-12">경북 경산시 진량읍 공단 7로 3...</p>
                    </div>
                </article>
                <article class="frame-17">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="트리즈 카페 찜 해제하기"
                                aria-pressed="true"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                        <img class="image" src="/images/restaurants/delicious/local/2.svg" alt="장군제육" />
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">장군제육</h3>
                        <p class="text-wrapper-12">경북 경산시 청운1로 6-1 라온빌</p>
                    </div>
                </article>
        </section>
        <section class="frame-19">
            <header class="frame-14">
                <h2 class="text-wrapper-11">최근 인기있는 카페에요</h2>
                <button type="button" aria-label="더보기">
                    <img
                            class="iconamoon-arrow-up"
                            src="/images/iconamoon-arrow-up-2.svg"
                            alt=""
                    />
                </button>
            </header>
            <div class="frame-14">
                <article class="frame-15">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="5525 카페 찜하기"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                        <img class="image" src="/images/cafes/dessert/14.svg" alt="브라우니" />
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">브라우니</h3>
                        <p class="text-wrapper-12">경북 경산시 청운로 14-3</p>
                    </div>
                </article>
                <article class="frame-17">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="트리즈 카페 찜 해제하기"
                                aria-pressed="true"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                        <img class="image" src="/images/cafes/dessert/15.svg" alt="플라플로" />
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">플라플로</h3>
                        <p class="text-wrapper-12">경북 경산시 대학로 281-1 7층</p>
                    </div>
                </article>
            </div>
        </section>
    </main>
    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
</body>
</html>
