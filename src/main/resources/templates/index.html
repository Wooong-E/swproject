<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Ro:D - 여행 추천 서비스</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/index.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
</head>
<body>
<div class="screen">
    <main class="div">
        <div th:replace="~{/fragments/header :: headerFragment}"></div>

        <section class="overlap" aria-label="메인 배너">
            <div class="frame-12" role="group" aria-label="페이지 인디케이터">
                <div class="ellipse" aria-label="현재 페이지"></div>
                <div class="ellipse-2" aria-label="페이지 2"></div>
                <div class="ellipse-2" aria-label="페이지 3"></div>
            </div>
        </section>
        <section class="frame-13">
            <header class="frame-14">
                <h2 class="text-wrapper-11">이런 곳은 어때요?</h2>
                <button type="button" aria-label="더보기">
                    <img
                            class="iconamoon-arrow-up"
                            src="/images/iconamoon-arrow-up-2.svg"
                            alt=""
                    />
                </button>
            </header>
            <div class="frame-14">
                <article class="frame-15">
                    <div class="img-wrapper">
                        <button class="img-2" type="button" aria-label="반곡지 찜하기">
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">반곡지(왕버들 저수지)</h3>
                        <p class="text-wrapper-12">수면의 버들이 멋진 사진 명소</p>
                    </div>
                </article>
                <article class="frame-17">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="이웃집 수달 찜 해제하기"
                                aria-pressed="true"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">이웃집 수달</h3>
                        <p class="text-wrapper-12">먹이를 줄 수 있는 동물농장</p>
                    </div>
                </article>
            </div>
        </section>
        <section class="frame-18">
            <header class="frame-14">
                <h2 class="text-wrapper-11">요즘 핫한 맛플레이스</h2>
                <button type="button" aria-label="더보기">
                    <img
                            class="iconamoon-arrow-up"
                            src="/images/iconamoon-arrow-up-2.svg"
                            alt=""
                    />
                </button>
            </header>
            <div class="frame-14">
                <article class="frame-15">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="5525 카페 찜하기"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">5525 카페</h3>
                        <p class="text-wrapper-12">프리미엄 로스터리 카페</p>
                    </div>
                </article>
                <article class="frame-17">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="트리즈 카페 찜 해제하기"
                                aria-pressed="true"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">트리즈 카페</h3>
                        <p class="text-wrapper-12">늦은 시간까지 작업하기 좋은 카페</p>
                    </div>
                </article>
            </div>
        </section>
        <section class="frame-19">
            <header class="frame-14">
                <h2 class="text-wrapper-11">최근 인기있는 카페에요</h2>
                <button type="button" aria-label="더보기">
                    <img
                            class="iconamoon-arrow-up"
                            src="/images/iconamoon-arrow-up-2.svg"
                            alt=""
                    />
                </button>
            </header>
            <div class="frame-14">
                <article class="frame-15">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="5525 카페 찜하기"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">5525 카페</h3>
                        <p class="text-wrapper-12">프리미엄 로스터리 카페</p>
                    </div>
                </article>
                <article class="frame-17">
                    <div class="img-wrapper">
                        <button
                                class="img-2"
                                type="button"
                                aria-label="트리즈 카페 찜 해제하기"
                                aria-pressed="true"
                        >
                            <img src="images/tabler_heart.svg" alt="" />
                        </button>
                    </div>
                    <div class="frame-16">
                        <h3 class="text-wrapper-3">트리즈 카페</h3>
                        <p class="text-wrapper-12">늦은 시간까지 작업하기 좋은 카페</p>
                    </div>
                </article>
            </div>
        </section>
    </main>
    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>
</body>
</html>
