<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>삼성현 역사문화공원 상세</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/place-detail.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
    <div class="screen">
        <main class="attraction-detail-main" data-place-id="5">
            <div th:replace="~{/fragments/header-back :: headerBackFragment}"></div>

            <!-- Main Image -->
            <div class="main-image-container">
                <img src="/images/attraction_samsunghyun.jpg" alt="명소 이미지" class="attraction-main-image" />
            </div>

            <!-- Title, Description, Heart Button -->
            <section class="info-section">
                <div class="title-heart-wrapper">
                    <h2 class="attraction-title">삼성현역사문화공원</h2>
                    <button id="likeButton" class="heart-button" type="button" aria-label="찜하기">
                        <img id="heartIcon" src="/images/tabler_heart.svg" alt="" />
                    </button>
                </div>
                <p class="attraction-description">원효, 설총, 일연 세 성현의 정신을 기리고 계승하기 위해 조성된 역사문화공원입니다. 교육과 휴식을 동시에 즐길 수 있습니다.</p>
            </section>

            <!-- Price and Transportation -->
            <section class="details-section">
                <p class="detail-item"><strong>주소</strong> <span>경북 경산시 남산면 삼성현공원로 59</span></p>
                <p class="detail-item"><strong>영업시간</strong> <span>동절기09:00-17:00 하절기09:00-18:00 (매주 월요일 휴무)</span></p>
                <p class="detail-item"><strong>전화번호</strong> <span>053-804-7329</span></p>
                <p class="detail-item"><strong>가격</strong> <span>무료</span></p>
            </section>

            <!-- Reviews Section -->
            <section class="reviews-section">
                <h3 class="reviews-title">후기</h3>
                <div class="reviews-carousel">
                    <div class="review-card">
                        <img src="/images/review_placeholder_4.png" alt="후기 이미지" class="review-image" />
                        <h4 class="review-card-title">역사 공부에 좋아요.</h4>
                        <div class="review-rating">
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_empty.svg" alt="별점" class="star-icon" />
                        </div>
                    </div>
                    <div class="review-card">
                        <img src="/images/review_placeholder_5.png" alt="후기 이미지" class="review-image" />
                        <h4 class="review-card-title">산책하기 좋아요.</h4>
                        <div class="review-rating">
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                            <img src="/images/star_filled.svg" alt="별점" class="star-icon" />
                        </div>
                    </div>
                </div>
            </section>

            <!-- Write Review Button -->
            <section class="write-review-section">
                <a href="/places/5/reviews/new" id="write-review-link" class="write-review-button">
                    <span class="write-review-text">작성하기</span>
                    <img src="/images/material-symbols_edit-outline-rounded.svg" alt="작성 아이콘" class="write-review-icon" />
                </a>
            </section>
        </main>

        <!-- Footer -->
        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>
    <script th:inline="javascript">
        var isLoggedIn = /*[[${isLoggedIn}]]*/ false;
    </script>
    <script th:src="@{/js/place-detail.js}"></script>
</body>
</html>
