<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro:D - 코스짜기 STEP 6</title>
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <link rel="stylesheet" th:href="@{/css/place-detail.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/course06.css}"/>
</head>
<body>
<div class="screen">
    <div th:replace="~{/fragments/header-course :: headerCourseFragment}"></div>

    <main>
        <form id="course06-form" action="/courses/course07" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="startAddress" th:value="${startAddress}">
            <input type="hidden" name="fhash" th:value="${fhash}">
            <input type="hidden" name="shash" th:value="${shash}">
            <input type="hidden" name="startDate" th:value="${startDate}">
            <input type="hidden" name="endDate" th:value="${endDate}">
            <!-- course05에서 선택한 장소들 -->
            <th:block th:if="${selectedPlaceIds != null}">
                <input type="hidden" th:each="id : ${selectedPlaceIds}" name="placeIds" th:value="${id}">
            </th:block>
            <!-- course06에서 선택한 장소들이 JS에 의해 추가될 영역 -->
            <div id="selected-recommended-places"></div>


            <div class="content-wrapper">
                <h1 class="prompt-text">원하는 코스를 골라주세요</h1>
            </div>

            <div class="recommendations-container">
                <!-- 명소 추천 -->
                <div class="category-section">
                    <h2>명소 추천</h2>
                    <div class="place-list">
                        <div th:each="place : ${recommendedPlaces}" th:if="${place.category == 'attraction'}" class="place-card" th:data-place-id="${place.id}">
                            <h3 th:text="${place.name}">장소 이름</h3>
                            <p class="category" th:text="${place.category}">명소</p>
                            <p class="hashtags"></p>
                            <p class="address" th:text="${place.address}">장소 주소</p>
                        </div>
                    </div>
                </div>

                <!-- 맛집 추천 -->
                <div class="category-section">
                    <h2>맛집 추천</h2>
                    <div class="place-list">
                        <div th:each="place : ${recommendedPlaces}" th:if="${place.category == 'restaurant'}" class="place-card" th:data-place-id="${place.id}">
                            <h3 th:text="${place.name}">장소 이름</h3>
                            <p class="category" th:text="${place.category}">맛집</p>
                            <p class="hashtags"></p>
                            <p class="address" th:text="${place.address}">장소 주소</p>
                        </div>
                    </div>
                </div>

                <!-- 카페 추천 -->
                <div class="category-section">
                    <h2>카페 추천</h2>
                    <div class="place-list">
                        <div th:each="place : ${recommendedPlaces}" th:if="${place.category == 'cafe'}" class="place-card" th:data-place-id="${place.id}">
                            <h3 th:text="${place.name}">장소 이름</h3>
                            <p class="category" th:text="${place.category}">카페</p>
                            <p class="hashtags"></p>
                            <p class="address" th:text="${place.address}">장소 주소</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="next-button-container">
                <button type="submit" id="selection-complete-button" disabled>선택 완료</button>
            </div>
        </form>
</main>
    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>

<script th:src="@{/js/course06.js}"></script>
</body>
</html>
