<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/images/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro:D - 코스 확정</title>
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <link rel="stylesheet" th:href="@{/css/header-courses.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/place-detail.css}"/>
    <link rel="stylesheet" th:href="@{/css/course08.css}"/>
</head>
<body>
<div class="screen">
    <div th:replace="~{/fragments/header-course :: headerCourseFragment}"></div>

    <main>
        <form id="course-confirm-form" action="/courses/09" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <!-- Pass all data to the final save endpoint -->
            <input type="hidden" name="startAddress" th:value="${startAddress}">
            <input type="hidden" name="fhash" th:value="${fhash}">
            <input type="hidden" name="shash" th:value="${shash}">
            <!-- Raw date values for backend -->
            <input type="hidden" name="startDate" th:value="${#temporals.format(rawStartDate, 'yyyy-MM-dd')}">
            <input type="hidden" name="endDate" th:value="${#temporals.format(rawEndDate, 'yyyy-MM-dd')}">

            <div class="content-wrapper">
                <h1 class="prompt-text">코스를 확정해주세요</h1>

                <div class="course-name-container">
                    <label for="course-name-input">코스 이름</label>
                    <input type="text" id="course-name-input" name="courseName" placeholder="예: 자연힐링코스" required>
                </div>

                <div class="date-display">
                    <span th:text="${displayStartDate} + ' ~ ' + ${displayEndDate}"></span>
                </div>
            </div>

            <ul id="place-list-container" class="place-list-container">
                <!-- Each li will be a flex container -->
                <li th:each="place : ${selectedPlaces}" class="place-item">
                    <div class="place-info">
                        <span class="place-color-dot"></span>
                        <span class="place-name" th:text="${place.name}"></span>
                                                <span class="place-category">
                            <th:block th:switch="${place.category}">
                                <span th:case="'attraction'">명소</span>
                                <span th:case="'restaurant'">맛집</span>
                                <span th:case="'cafe'">카페</span>
                                <span th:case="*">[[${place.category}]]</span>
                            </th:block>
                        </span>
                    </div>
                    <button type="button" class="delete-button">-</button>
                    <!-- The actual place IDs to be submitted -->
                    <input type="hidden" name="placeIds" th:value="${place.id}">
                </li>
            </ul>

            <div class="next-button-container">
                <button type="submit" id="selection-complete-button">확인</button>
            </div>
        </form>
    </main>

    <div th:replace="~{/fragments/footer :: footerFragment}"></div>
</div>

<script th:src="@{/js/course08.js}"></script>
</body>
</html>
