<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/images/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro:D - 코스짜기</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <link rel="stylesheet" th:href="@{/css/header-courses.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/place-detail.css}"/>
    <link rel="stylesheet" th:href="@{/css/course07.css}"/>
</head>
<body>
    <div class="screen">
        <div th:replace="~{/fragments/header-course :: headerCourseFragment}"></div>

        <main>
            <form id="course07-form" action="/courses/course08" method="post">
                <!-- All data from previous steps -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="startAddress" th:value="${startAddress}">
                <input type="hidden" name="fhash" th:value="${fhash}">
                <input type="hidden" name="shash" th:value="${shash}">
                <input type="hidden" name="startDate" th:value="${startDate}">
                <input type="hidden" name="endDate" th:value="${endDate}">
                <th:block th:if="${placeIds != null}">
                    <input type="hidden" th:each="id : ${placeIds}" name="placeIds" th:value="${id}">
                </th:block>

                <div class="progress-bar"></div>

                <div class="loading-content">
                    <img th:src="@{/images/plane.png}" alt="비행기" class="plane-image">
                    <p class="loading-text">코스를 짜고 있어요</p>
                </div>
            </form>
        </main>

        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>

    <script th:src="@{/js/course07.js}"></script>
</body>
</html>
