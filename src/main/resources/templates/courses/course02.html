<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro:D - 코스짜기 STEP 2</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <link rel="stylesheet" th:href="@{/css/header-courses.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/place-detail.css}"/>
    <link rel="stylesheet" th:href="@{/css/course02.css}"/>
</head>
<body>
    <div class="screen">
        <div th:replace="~{/fragments/header-course :: headerCourseFragment}"></div>

        <main>
            <div class="progress-bar-container">
                <div class="progress-bar-inner"></div>
            </div>

            <div class="content-wrapper">
                <p class="step-text">STEP2</p>
                <h1 class="prompt-text">어떤 분위기의 여행인가요?</h1>
                <p class="sub-prompt-text">원하시는 분위기로 구성해드려요</p>
            </div>

            <div class="mood-buttons-container">
                <button class="mood-button" data-mood="healing">
                    <img src="/images/healing.png" alt="">
                    <span>힐링 여행</span>
                </button>
                <button class="mood-button" data-mood="date">
                    <img src="/images/date.png" alt="">
                    <span>데이트 코스</span>
                </button>
                <button class="mood-button" data-mood="extreme">
                    <img src="/images/extream.png" alt="">
                    <span>익스트림 여행</span>
                </button>
                <button class="mood-button" data-mood="eating">
                    <img src="/images/eating.png" alt="">
                    <span>식도락 여행</span>
                </button>
            </div>

            <div class="next-button-container">
                <button type="button" id="selection-complete-button" disabled>선택 완료</button>
            </div>
        </main>

        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>

    <script th:src="@{/js/course02.js}"></script>
</body>
</html>
