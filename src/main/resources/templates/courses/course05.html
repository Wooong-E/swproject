<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro:D - 코스짜기 STEP 6</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <link rel="stylesheet" th:href="@{/css/header-courses.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/place-detail.css}"/>
    <link rel="stylesheet" th:href="@{/css/course05.css}"/>

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>
<body>
    <div class="screen">
        <div th:replace="~{/fragments/header-course :: headerCourseFragment}"></div>

        <main>
            <form id="course05-form" action="/courses/course06" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" id="startAddress-input" name="startAddress" th:value="${startAddress}">
                <input type="hidden" id="fhash-input" name="fhash" th:value="${fhash}">
                <input type="hidden" id="shash-input" name="shash" th:value="${shash}">
                <input type="hidden" id="startDate-input" name="startDate" th:value="${startDate}">
                <input type="hidden" id="endDate-input" name="endDate" th:value="${endDate}">
                <input type="hidden" id="selectedPlaceIds-input" name="placeIds">

                <div class="progress-bar-container">
                    <div class="progress-bar-inner"></div>
                </div>

                <div class="content-wrapper">
                    <p class="step-text">STEP5</p>
                    <h1 class="prompt-text">원하시는 장소가 있나요?</h1>
                    <p class="sub-prompt-text">이전에 봐두었던 장소에요</p>
                </div>

                <!-- Liked Places List Container -->
                <div class="liked-places-list-container" id="liked-places-dynamic-list">
                    <div th:if="${#maps.isEmpty(categorizedLikedPlaces)}">
                        <p style="text-align: center; padding: 20px;">찜한 장소가 없습니다.</p>
                    </div>
                    <div th:each="categoryEntry : ${categorizedLikedPlaces}">
                        <h2 th:text="${categoryEntry.key == 'attraction' ? '명소' : (categoryEntry.key == 'restaurant' ? '맛집' : '카페')}">카테고리</h2>
                        <div class="place-list">
                            <div th:each="place : ${categoryEntry.value}" class="place-card" th:data-place-id="${place.id}" th:data-place-category="${place.category}">
                                <img th:src="@{${'/images/' + place.category + 's/' + (place.category == 'attraction' ? 'attraction_' + place.id : (place.category == 'restaurant' ? 'restaurant_' + (place.id - 6) : 'cafe_' + (place.id - 12))) + '.jpg'}}" alt="장소 이미지" class="place-image">
                                <div class="place-info">
                                    <h3 th:text="${place.name}">장소 이름</h3>
                                    <p th:text="${place.address}">장소 주소</p>
                                </div>
                                <div class="place-actions">
                                    <button class="heart-button" type="button" aria-label="찜하기" th:data-place-id="${place.id}">
                                        <img src="/images/tabler_heart_filled.svg" alt="찜됨" class="heart-icon" />
                                    </button>
                                    <input type="checkbox" th:id="${'place-checkbox-' + place.id}" class="place-checkbox" th:value="${place.id}" style="display: none;">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Create Course Button -->
                <div class="create-course-button-container">
                    <button type="submit" id="create-course-button">코스짜기</button>
                </div>
            </form>
        </main>

        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>

    <script th:src="@{/js/course05.js}"></script>
</body>
</html>
