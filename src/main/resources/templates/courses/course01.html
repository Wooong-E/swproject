<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/images/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro:D - 코스짜기 STEP 1</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <link rel="stylesheet" th:href="@{/css/header-courses.css}"/>
    <link rel="stylesheet" th:href="@{/css/place-detail.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/course01.css}"/>

    <!-- Kakao Postcode API -->
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
    <div class="screen">
        <div th:replace="~{/fragments/header-course :: headerCourseFragment}"></div>

        <main>
            <form id="course01-form" action="/courses/course02" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" id="startAddress-input" name="startAddress">
                <div class="progress-bar-container">
                    <div class="progress-bar-inner"></div>
                </div>

                <div class="content-wrapper">
                    <p class="step-text">STEP1</p>
                    <h1 class="prompt-text">출발지는 어디인가요?</h1>

                    <div class="address-search-container">
                        <input type="text" id="address-input" placeholder="도로명 주소" readonly>
                        <button type="button" id="search-address-button">주소 검색</button>
                    </div>
                </div>
                <div class="next-button-container">
                    <button type="submit" id="next-button" class="next-button" disabled>코스짜기</button>
                </div>
            </form>
        </main>

        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>

    <script th:src="@{/js/course01.js}"></script>
</body>
</html>
