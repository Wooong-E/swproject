<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/images/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro:D - 코스짜기 STEP 3</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <link rel="stylesheet" th:href="@{/css/header-courses.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/place-detail.css}"/>
    <link rel="stylesheet" th:href="@{/css/course03.css}"/>
</head>
<body>
    <div class="screen">
        <div th:replace="~{/fragments/header-course :: headerCourseFragment}"></div>

        <main>
            <form id="course03-form" action="/courses/course04" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" id="startAddress-input" name="startAddress" th:value="${startAddress}">
                <input type="hidden" id="fhash-input" name="fhash" th:value="${fhash}">
                <input type="hidden" id="shash-input" name="shash">
                <div class="progress-bar-container">
                    <div class="progress-bar-inner"></div>
                </div>

                <div class="content-wrapper">
                    <p class="step-text">STEP3</p>
                    <h1 class="prompt-text">누구랑 떠나시나요?</h1>
                    <p class="sub-prompt-text">함께하는 사람에 따라 여행이 달라지니까요</p>
                </div>

                <div class="mood-buttons-container">
                    <button class="mood-button" type="button" data-companion="#나혼자">
                        <span>나혼자</span>
                    </button>
                    <button class="mood-button" type="button" data-companion="#연인과">
                        <span>연인과</span>
                    </button>
                    <button class="mood-button" type="button" data-companion="#친구들">
                        <span>친구들</span>
                    </button>
                    <button class="mood-button" type="button" data-companion="#가족과">
                        <span>가족과</span>
                    </button>
                </div>

                <div class="next-button-container">
                    <button type="submit" id="selection-complete-button" disabled>선택 완료</button>
                </div>
            </form>
        </main>

        <div th:replace="~{/fragments/footer :: footerFragment}"></div>
    </div>

    <script th:src="@{/js/course03.js}"></script>
</body>
</html>
