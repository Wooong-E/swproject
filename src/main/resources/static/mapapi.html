<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>최단 경로로 선 연결하기 (TSP)</title>
</head>
<body>
<div id="map" style="width:100%;height:600px;"></div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7848bca557e9c70c527fba62b3953a8c&libraries=services"></script>

<script>
    // 1. 지도 생성
    var mapContainer = document.getElementById('map'),
        mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 서울시청 중심
            level: 8
        };
    var map = new kakao.maps.Map(mapContainer, mapOption);

    // 2. 주소 목록 (순서 무관)
    var addresses = [
        "서울 용산구 한강대로 405 (서울역)",
        "경기 수원시 팔달구 정조로 777 (수원화성)",
        "서울 강남구 강남대로 396 (강남역)",
        "인천 중구 공항로 272 (인천국제공항)",
        "경기 성남시 분당구 판교역로 160 (판교역)",
        "서울 송파구 올림픽로 424 (올림픽공원)"
    ];

    var geocoder = new kakao.maps.services.Geocoder();

    // 3. 모든 주소를 좌표로 변환하는 Promise 배열 생성
    var geocodePromises = addresses.map(function(address) {
        return new Promise(function(resolve, reject) {
            geocoder.addressSearch(address, function(result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    resolve({
                        address: address,
                        coords: new kakao.maps.LatLng(result[0].y, result[0].x)
                    });
                } else {
                    reject(new Error("Geocoding failed for address: " + address));
                }
            });
        });
    });

    // 4. 모든 주소 변환이 완료되면 최단 경로 계산 및 그리기 시작
    Promise.all(geocodePromises)
        .then(function(points) {
            var shortestPath = findShortestPath(points);
            drawPath(shortestPath);
        })
        .catch(function(error) {
            console.error(error);
            alert("주소 변환 중 오류가 발생했습니다. 개발자 콘솔을 확인해주세요.");
        });

    // 두 좌표 간의 거리를 계산하는 함수 (Haversine formula)
    function getDistance(latlng1, latlng2) {
        function toRad(value) {
            return value * Math.PI / 180;
        }
        var R = 6371; // km
        var dLat = toRad(latlng2.getLat() - latlng1.getLat());
        var dLon = toRad(latlng2.getLng() - latlng1.getLng());
        var lat1 = toRad(latlng1.getLat());
        var lat2 = toRad(latlng2.getLat());

        var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.sin(dLon/2) * Math.sin(dLon/2) * Math.cos(lat1) * Math.cos(lat2);
        var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        var d = R * c;
        return d;
    }

    // 최단 근접 이웃 알고리즘으로 최단 경로를 찾는 함수
    function findShortestPath(points) {
        if (points.length === 0) return [];

        var path = [];
        var unvisited = [...points];

        // 시작점: unvisited 배열의 첫 번째 요소
        var currentPoint = unvisited.splice(0, 1)[0];
        path.push(currentPoint);

        while (unvisited.length > 0) {
            var nearest = null;
            var nearestDistance = Infinity;
            var nearestIndex = -1;

            for (var i = 0; i < unvisited.length; i++) {
                var distance = getDistance(currentPoint.coords, unvisited[i].coords);
                if (distance < nearestDistance) {
                    nearestDistance = distance;
                    nearest = unvisited[i];
                    nearestIndex = i;
                }
            }

            // 가장 가까운 점을 unvisited에서 제거하고 path에 추가
            currentPoint = unvisited.splice(nearestIndex, 1)[0];
            path.push(currentPoint);
        }
        return path;
    }

    // 경로를 지도에 그리는 함수
    function drawPath(path) {
        var linePath = path.map(function(p) { return p.coords; });

        // 지도에 표시할 선을 생성합니다
        var polyline = new kakao.maps.Polyline({
            path: linePath,
            strokeWeight: 4,
            strokeColor: '#FF0000',
            strokeOpacity: 0.8,
            strokeStyle: 'solid'
        });
        polyline.setMap(map);

        // 각 지점에 마커와 순서를 표시합니다
        path.forEach(function(p, index) {
            var marker = new kakao.maps.Marker({
                map: map,
                position: p.coords
            });

            var infowindow = new kakao.maps.InfoWindow({
                content: `<div style="padding:5px;font-size:12px;">${index + 1}. ${p.address.split('(')[0]}</div>`
            });
            infowindow.open(map, marker);
        });
    }
</script>
</body>
</html>
